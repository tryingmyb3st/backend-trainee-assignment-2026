all: false
dir: 'mocks/{{.SrcPackageName}}'
filename: mocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}_mock'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
    backend-assignment-avito/internal/features/auth/service:
        config:
            all: true
    backend-assignment-avito/internal/features/bookings/service:
        config:
            all: true
    backend-assignment-avito/internal/features/slots/service:
        config:
            all: true
    backend-assignment-avito/internal/features/schedules/service:
        config:
            all: true