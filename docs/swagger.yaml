definitions:
  backend-assignment-avito_internal_core_domain.CustomError:
    properties:
      code:
        enum:
        - INVALID_REQUEST
        - ' INTERNAL_ERROR'
        - ' SCHEDULE_EXISTS'
        - ' SLOT_ALREADY_BOOKED'
        - ' FORBIDEN'
        - ' NOT_FOUND'
        type: string
      message:
        example: invalid request
        type: string
    type: object
  backend-assignment-avito_internal_core_domain.InternalError:
    properties:
      code:
        enum:
        - INTERNAL_ERROR
        type: string
      message:
        example: internal server error
        type: string
    type: object
  internal_features_auth_transport_http.DummyLoginDTO:
    properties:
      role:
        example: user
        type: string
    type: object
  internal_features_auth_transport_http.DummyLoginDTOResponse:
    properties:
      token:
        type: string
    type: object
  internal_features_auth_transport_http.LoginDTO:
    properties:
      email:
        example: useremail@gmail.com
        type: string
      password:
        example: supersecretpass
        type: string
    type: object
  internal_features_auth_transport_http.LoginDTOResponse:
    properties:
      token:
        type: string
    type: object
  internal_features_auth_transport_http.RegisterDTO:
    properties:
      email:
        example: useremail@gmail.com
        type: string
        x-order: "0"
      password:
        example: supersecretpass
        type: string
        x-order: "1"
      role:
        example: admin
        type: string
        x-order: "2"
    type: object
  internal_features_auth_transport_http.RegisterDTOResponse:
    properties:
      createdAt:
        example: "2026-03-25T12:00:41.267Z"
        type: string
        x-order: "4"
      email:
        example: useremail@gmail.com
        type: string
        x-order: "1"
      id:
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        type: string
        x-order: "0"
      password:
        type: string
        x-order: "2"
      role:
        example: admin
        type: string
        x-order: "3"
    type: object
  internal_features_bookings_transport_http.BookingDTO:
    properties:
      createdAt:
        example: "2026-03-25T12:00:41.267Z"
        type: string
        x-order: "5"
      id:
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        type: string
        x-order: "0"
      slotId:
        example: 4hbdaf64-5717-4562-b3fc-2c963f66aba6
        type: string
        x-order: "1"
      status:
        example: string
        type: string
        x-order: "4"
      userId:
        example: 9hbd88864-5717-4562-b3fc-2c963f66af77
        type: string
        x-order: "3"
    type: object
  internal_features_bookings_transport_http.BookingDTOResponse:
    properties:
      booking:
        $ref: '#/definitions/internal_features_bookings_transport_http.BookingDTO'
    type: object
  internal_features_bookings_transport_http.BookingsDTOResponse:
    properties:
      bookings:
        items:
          $ref: '#/definitions/internal_features_bookings_transport_http.BookingDTO'
        type: array
    type: object
  internal_features_bookings_transport_http.BookingsDTOWithPagination:
    properties:
      bookings:
        items:
          $ref: '#/definitions/internal_features_bookings_transport_http.BookingDTO'
        type: array
      pagination:
        $ref: '#/definitions/internal_features_bookings_transport_http.PaginationDTO'
    type: object
  internal_features_bookings_transport_http.PaginationDTO:
    properties:
      page:
        example: 1
        type: integer
        x-order: "0"
      pageSize:
        example: 10
        type: integer
        x-order: "1"
      total:
        example: 15
        type: integer
        x-order: "2"
    type: object
  internal_features_bookings_transport_http.SlotDTO:
    properties:
      slotId:
        type: string
    type: object
  internal_features_rooms_transport_http.CreateRoomDTO:
    properties:
      capacity:
        example: 3
        type: integer
        x-order: "2"
      description:
        example: some description...
        type: string
        x-order: "1"
      name:
        example: work_room
        type: string
        x-order: "0"
    type: object
  internal_features_rooms_transport_http.RoomDTO:
    properties:
      capacity:
        example: 3
        type: integer
        x-order: "3"
      createdAt:
        example: "2026-03-25T12:00:41.267Z"
        type: string
        x-order: "4"
      description:
        example: room for work...
        type: string
        x-order: "2"
      id:
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        type: string
        x-order: "0"
      name:
        example: work_room
        type: string
        x-order: "1"
    type: object
  internal_features_rooms_transport_http.RoomDTOResponse:
    properties:
      room:
        $ref: '#/definitions/internal_features_rooms_transport_http.RoomDTO'
    type: object
  internal_features_rooms_transport_http.RoomsDTOResponse:
    properties:
      rooms:
        items:
          $ref: '#/definitions/internal_features_rooms_transport_http.RoomDTO'
        type: array
    type: object
  internal_features_schedules_transport_http.ScheduleDTOResponse:
    properties:
      daysOfWeek:
        items:
          type: integer
        type: array
      id:
        type: string
      roomId:
        type: string
    type: object
  internal_features_slots_transport_http.SlotDTOResponse:
    properties:
      end:
        example: "2026-03-25T14:01:22.680Z"
        type: string
        x-order: "3"
      id:
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        type: string
        x-order: "0"
      roomId:
        example: 78a85f64-6717-4562-b3fc-2c963f6abfa6
        type: string
        x-order: "1"
      start:
        example: "2026-03-25T14:01:22.680Z"
        type: string
        x-order: "2"
    type: object
  internal_features_slots_transport_http.SlotsDTOResponse:
    properties:
      slots:
        items:
          $ref: '#/definitions/internal_features_slots_transport_http.SlotDTOResponse'
        type: array
    type: object
host: 127.0.0.1:8080
info:
  contact: {}
  title: Rooms Booking Service
paths:
  /bookings/{bookingId}/cancel:
    post:
      consumes:
      - application/json
      description: 'Доступно только роли user. Пользователь может отменить только
        свою бронь. Операция идемпотентна: повторный вызов на уже отменённой брони
        не является ошибкой и возвращает 200 с актуальным состоянием брони (status:
        cancelled). При попытке отменить чужую бронь — 403. При отсутствии брони с
        указанным ID — 404.'
      parameters:
      - description: Идентификатор брони
        in: path
        name: bookingId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Бронь отменена (или уже была отменена ранее)
          schema:
            $ref: '#/definitions/internal_features_bookings_transport_http.BookingDTOResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Не своя бронь или роль не user
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "404":
          description: Бронь не найдена
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
      summary: Отменить бронь (только своя бронь, только user)
      tags:
      - Bookings
  /bookings/create:
    post:
      consumes:
      - application/json
      description: Доступно только роли user. Администратор не может создавать брони
        (403). userId берётся из JWT-токена, а не из тела запроса. Если временной
        слот находится в прошлом (start < now), возвращается 400 (INVALID_REQUEST).
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_bookings_transport_http.SlotDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Бронь создана
          schema:
            $ref: '#/definitions/internal_features_bookings_transport_http.BookingDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Доступ запрещён (бронирование доступно только роли user)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "404":
          description: Слот не найден
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "409":
          description: Слот уже занят
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
      summary: Создать бронь на слот (только user). Опционально — запросить ссылку
        на конференцию.
      tags:
      - Bookings
  /bookings/list:
    get:
      consumes:
      - application/json
      description: 'Доступно только роли admin. Поддерживает пагинацию через параметры
        page и pageSize. Оба параметра опциональны; значения по умолчанию: page=1,
        pageSize=20. Максимальное значение pageSize — 100.'
      parameters:
      - description: Номер страницы (начиная с 1). По умолчанию 1.
        in: query
        name: page
        type: integer
      - description: Количество записей на странице. По умолчанию 20, максимум 100.
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Cписок всех броней
          schema:
            $ref: '#/definitions/internal_features_bookings_transport_http.BookingsDTOWithPagination'
        "400":
          description: Неверный запрос (некорректные параметры пагинации)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Доступ запрещён (только admin)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
      summary: Список всех броней с пагинацией (только admin)
      tags:
      - Bookings
  /bookings/my:
    get:
      consumes:
      - application/json
      description: Доступно только роли user. Возвращает брони пользователя, чей user_id
        содержится в JWT-токене. Возвращаются только брони на будущие слоты (start
        >= now); брони на уже прошедшие слоты в ответ не включаются.
      produces:
      - application/json
      responses:
        "200":
          description: Список броней текущего пользователя
          schema:
            $ref: '#/definitions/internal_features_bookings_transport_http.BookingsDTOResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Доступ запрещён (только user)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Список броней текущего пользователя (только user)
      tags:
      - Bookings
  /dummyLogin:
    post:
      consumes:
      - application/json
      description: 'Выдаёт тестовый JWT для указанной роли (admin / user). Для каждой
        роли возвращается фиксированный UUID пользователя: один и тот же UUID для
        всех запросов с ролью admin и один и тот же UUID для роли user. Это обеспечивает
        стабильность при тестировании сценариев, требующих проверки владельца брони.'
      parameters:
      - description: DummyLogin тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.DummyLoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Тестовый токен
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.DummyLoginDTOResponse'
        "400":
          description: Неверный запрос (недопустимое значение роли)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Получить тестовый JWT по роли
      tags:
      - Auth
  /login:
    post:
      consumes:
      - application/json
      description: Авторизует пользователя по email и паролю, возвращает JWT. Реализация
        этого эндпоинта является дополнительным заданием. Для авторизации в рамках
        обязательной части используйте /dummyLogin. Доступен без авторизации.
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Успешная авторизация
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.LoginDTOResponse'
        "401":
          description: Неверные учётные данные
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Авторизация по email и паролю
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и возвращает его данные. Реализация
        этого эндпоинта является дополнительным заданием. Для авторизации в рамках
        обязательной части используйте /dummyLogin. Доступен без авторизации.
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.RegisterDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь создан
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.RegisterDTOResponse'
        "400":
          description: Неверный запрос или email уже занят
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Регистрация пользователя
      tags:
      - Auth
  /rooms/{roomId}/schedule/create:
    post:
      consumes:
      - application/json
      description: Доступно только роли admin. Расписание можно создать только один
        раз для каждой переговорки. Поле daysOfWeek должно содержать значения от 1
        до 7 (1=Пн, 7=Вс). При передаче значений вне этого диапазона возвращается
        400.
      parameters:
      - description: Идентификатор переговорки
        in: path
        name: roomId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Расписание сохранено
          schema:
            $ref: '#/definitions/internal_features_schedules_transport_http.ScheduleDTOResponse'
        "400":
          description: Неверный запрос (в т.ч. недопустимые значения daysOfWeek)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Доступ запрещён (требуется роль admin)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "404":
          description: Переговорка не найдена
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "409":
          description: Расписание для переговорки уже создано, изменение не допускается
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Создать расписание переговорки (только admin, только один раз). Длительность
        слота 30 мин. После создания расписание изменить нельзя.
      tags:
      - Schedules
  /rooms/{roomId}/slots/list:
    get:
      consumes:
      - application/json
      description: Возвращает слоты, не занятые активной бронью, для указанной переговорки
        на указанную дату. Все даты и время передаются и возвращаются в UTC. Параметр
        date является обязательным; при его отсутствии возвращается 400. Если у переговорки
        нет расписания — возвращается пустой список (переговорка считается всегда
        недоступной).
      parameters:
      - description: Идентификатор переговорки
        in: path
        name: roomId
        required: true
        type: string
      - description: 'Дата в формате ISO 8601 (например: 2024-06-10). Обязательный
          параметр; при отсутствии — 400'
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Список доступных слотов (не занятых активной бронью). Пустой
            список, если у переговорки нет расписания или на эту дату нет слотов.
          schema:
            $ref: '#/definitions/internal_features_slots_transport_http.SlotsDTOResponse'
        "400":
          description: Неверный запрос (отсутствует или некорректен параметр date)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "404":
          description: Переговорка не найдена
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Список доступных для бронирования слотов по переговорке и дате (admin
        и user). Наиболее нагруженный эндпоинт.
      tags:
      - Slots
  /rooms/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_rooms_transport_http.CreateRoomDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Переговорка создана
          schema:
            $ref: '#/definitions/internal_features_rooms_transport_http.RoomDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "403":
          description: Доступ запрещён (требуется роль admin)
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Создать переговорку (только admin)
      tags:
      - Rooms
  /rooms/list:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: Список переговорок
          schema:
            $ref: '#/definitions/internal_features_rooms_transport_http.RoomsDTOResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/backend-assignment-avito_internal_core_domain.InternalError'
      summary: Список переговорок (admin и user)
      tags:
      - Rooms
swagger: "2.0"
